<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SocraticStudy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.25.0",
    "langsmith": "https://esm.sh/empty",
    "langsmith/": "https://esm.sh/empty/",
    "langchain/vectorstores/memory": "https://esm.sh/langchain@0.1.30/vectorstores/memory",
    "langchain/text_splitter": "https://esm.sh/langchain@0.1.30/text_splitter",
    "@langchain/core/documents": "https://esm.sh/@langchain/core@0.1.52/documents",
    "@langchain/core/": "https://esm.sh/@langchain/core@0.1.52/",
    "@langchain/google-genai": "https://esm.sh/@langchain/google-genai@0.0.16",
    "langchain/": "https://aistudiocdn.com/langchain@^0.3.36/"
  }
}
</script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'brand-primary': '#6366f1', // Indigo 500
              'brand-secondary': '#4f46e5', // Indigo 600
              'brand-light': '#e0e7ff', // Indigo 100
              'brand-dark': '#3730a3', // Indigo 800
              'accent': '#ec4899', // Pink 500
              'surface': 'rgba(255, 255, 255, 0.7)',
              'surface-dark': 'rgba(17, 24, 39, 0.7)',
            },
            animation: {
              'shimmer': 'shimmer 1.5s infinite linear',
              'blob': 'blob 7s infinite',
              'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
            },
            keyframes: {
              shimmer: {
                '0%': { backgroundPosition: '-1000px 0' },
                '100%': { backgroundPosition: '1000px 0' },
              },
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            },
          },
        },
      }
    </script>
    <!-- React and ReactDOM UMD (not used by import map runtime modules, but harmless) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = `https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js`;
    </script>
    
    <!-- Google GenAI SDK -->
    <script type="module">
        import { GoogleGenAI } from "https://esm.run/@google/genai";
        window.GoogleGenAI = GoogleGenAI;
    </script>
<link rel="stylesheet" href="/index.css">
</head>

  </body>
